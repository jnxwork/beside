<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Together</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2a2838;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    #game-container {
      position: relative;
      border: 3px solid #16213e;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    canvas { display: block; }

    /* Room label */
    #room-label {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
    }
    #room-label.focus { background: rgba(15,52,96,0.85); color: #7ec8e3; }
    #room-label.rest  { background: rgba(83,52,131,0.85); color: #e8b4f8; }

    /* UI bar */
    #ui-bar {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      align-items: center;
    }
    #ui-bar input, #ui-bar select {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 6px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
    }
    #ui-bar input:focus, #ui-bar select:focus {
      outline: none;
      border-color: #e94560;
    }
    #online-count { color: #53d769; font-size: 14px; }
    #hint { margin-top: 8px; font-size: 12px; color: #666; }

    /* Chat panel */
    #chat-wrap {
      position: absolute;
      left: 8px;
      bottom: 8px;
      display: none;
      flex-direction: column;
      align-items: flex-start;
      z-index: 20;
    }
    #chat-wrap.visible { display: flex; }
    #chat-toggle {
      background: rgba(83,52,131,0.85);
      color: #e8b4f8;
      border: 1px solid #0f3460;
      padding: 4px 12px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      align-self: flex-start;
    }
    #chat-toggle:hover { background: rgba(107,68,160,0.9); }
    #chat-panel {
      width: 240px;
      height: 170px;
      display: flex;
      flex-direction: column;
      background: rgba(22,33,62,0.88);
      border-radius: 0 8px 8px 8px;
      border: 1px solid #0f3460;
      overflow: hidden;
      transition: height 0.2s ease, opacity 0.2s ease;
    }
    #chat-panel.collapsed {
      height: 0;
      border: none;
      opacity: 0;
      pointer-events: none;
    }
    #chat-title {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: bold;
      color: #e8b4f8;
      border-bottom: 1px solid #0f3460;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 12px;
      line-height: 1.5;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }
    .chat-msg { margin-bottom: 6px; word-break: break-word; }
    .chat-msg .chat-name { color: #f5a623; font-weight: bold; }
    .chat-msg .chat-text { color: #ddd; }
    #chat-input-bar {
      display: flex;
      padding: 6px;
      gap: 4px;
      border-top: 1px solid #0f3460;
    }
    #chat-input {
      flex: 1;
      background: #0f1b38;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 5px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
    }
    #chat-input:focus { outline: none; border-color: #e94560; }
    #chat-send {
      background: #533483;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    #chat-send:hover { background: #6b44a0; }

    /* Music control */
    #music-control {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #music-toggle {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    #music-toggle:hover { border-color: #e94560; }
    #volume-slider {
      width: 60px;
      accent-color: #e94560;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="800" height="576"></canvas>
    <div id="room-label" class="focus">Focus Zone</div>
    <div id="chat-wrap">
      <button id="chat-toggle">Hide</button>
      <div id="chat-panel">
        <div id="chat-title">Rest Zone Chat</div>
        <div id="chat-messages"></div>
        <div id="chat-input-bar">
          <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>
  </div>
  <div id="ui-bar">
    <input id="name-input" type="text" placeholder="Your name..." maxlength="12" />
    <select id="status-select">
      <option value="studying">studying</option>
      <option value="working">working</option>
      <option value="reading">reading</option>
      <option value="resting">resting</option>
      <option value="coding">coding</option>
    </select>
    <span id="online-count">Online: 1</span>
    <div id="music-control">
      <button id="music-toggle">Sound: OFF</button>
      <input id="volume-slider" type="range" min="0" max="100" value="30" />
    </div>
  </div>
  <div id="hint">Arrow keys / WASD to move | Walk to the portal to switch rooms</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
