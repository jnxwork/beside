<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stay Together</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2a2838">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/misans@4.1.0/lib/Normal/MiSans-Regular.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2a2838;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: 'MiSans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-weight: bold;
      color: #eee;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container {
      position: relative;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
    canvas#game {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Room label — fades in then out */
    #room-label {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #room-label.visible { opacity: 1; }
    #room-label.focus { background: rgba(15,52,96,0.85); color: #7ec8e3; }
    #room-label.rest  { background: rgba(83,52,131,0.85); color: #e8b4f8; }

    /* Info panel — top left, compact with hover expand */
    #info-panel {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 4px 8px;
      background: rgba(42,40,56,0.65);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 12px;
      z-index: 12;
      font-size: 16px;
      cursor: default;
      transition: background 0.3s ease;
    }
    #info-panel:hover { background: rgba(42,40,56,0.85); }
    #online-total { color: #53d769; font-weight: bold; font-size: 16px; white-space: nowrap; }
    #online-detail {
      display: flex;
      gap: 8px;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.35s ease, opacity 0.25s ease, margin 0.35s ease;
      white-space: nowrap;
      margin-left: 0;
    }
    #info-panel:hover #online-detail {
      max-width: 320px;
      opacity: 1;
      margin-left: 8px;
    }
    #online-sep { color: rgba(255,255,255,0.3); font-size: 16px; }
    #online-focus { color: #7ec8e3; font-size: 14px; }
    #online-dot { color: rgba(255,255,255,0.3); font-size: 14px; }
    #online-lounge { color: #e8b4f8; font-size: 14px; }

    /* Settings panel — top right, compact with hover expand */
    #settings-panel {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 4px 8px;
      background: rgba(42,40,56,0.65);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 12px;
      z-index: 12;
      cursor: default;
      transition: background 0.3s ease;
    }
    #settings-panel:hover, #settings-panel:focus-within { background: rgba(42,40,56,0.85); }
    #settings-icon { font-size: 16px; line-height: 1; }
    #settings-detail {
      display: flex;
      gap: 4px;
      align-items: center;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.35s ease, opacity 0.25s ease, margin 0.35s ease;
      white-space: nowrap;
      margin-left: 0;
    }
    #settings-panel:hover #settings-detail,
    #settings-panel:focus-within #settings-detail {
      max-width: 400px;
      opacity: 1;
      margin-left: 8px;
    }
    #settings-detail #name-input {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
      width: 90px;
      -webkit-user-select: text;
      user-select: text;
    }
    #settings-detail #name-input:focus {
      outline: none;
      border-color: #f5a623;
    }

    /* Action bar — bottom center floating pill */
    #action-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 4px 12px;
      align-items: center;
      background: rgba(42,40,56,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 20px;
      z-index: 12;
      transition: background 0.3s ease;
    }
    #action-bar:hover, #action-bar:focus-within {
      background: rgba(42,40,56,0.85);
    }
    #action-bar select {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
    }
    #action-bar select:focus {
      outline: none;
      border-color: #f5a623;
    }
    #hint {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      color: rgba(255,255,255,0.3);
      z-index: 12;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Joystick */
    #joystick-zone {
      display: none;
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 128px;
      height: 128px;
      z-index: 15;
      touch-action: none;
    }
    #joystick-zone canvas {
      border: none;
      border-radius: 50%;
    }

    /* Chat panel */
    #chat-wrap {
      position: absolute;
      left: 8px;
      bottom: 8px;
      display: none;
      flex-direction: column;
      align-items: flex-start;
      z-index: 20;
    }
    #chat-wrap.visible { display: flex; }
    #chat-toggle {
      background: rgba(83,52,131,0.85);
      color: #e8b4f8;
      border: 1px solid #0f3460;
      padding: 4px 12px;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
      align-self: flex-start;
    }
    #chat-toggle:hover { background: rgba(107,68,160,0.9); }
    #chat-panel {
      width: 300px;
      height: 220px;
      display: flex;
      flex-direction: column;
      background: rgba(22,33,62,0.88);
      border-radius: 0 8px 8px 8px;
      border: 1px solid #0f3460;
      overflow: hidden;
      transition: height 0.2s ease, opacity 0.2s ease;
    }
    #chat-panel.collapsed {
      height: 0;
      border: none;
      opacity: 0;
      pointer-events: none;
    }
    #chat-title {
      padding: 8px 12px;
      font-size: 16px;
      font-weight: bold;
      color: #e8b4f8;
      border-bottom: 1px solid #0f3460;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 14px;
      line-height: 1.4;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
    .chat-msg { margin-bottom: 4px; word-break: break-word; line-height: 1.4; }
    .chat-msg .chat-time { color: #666; font-size: 14px; margin-right: 4px; }
    .chat-msg .chat-name { font-weight: bold; font-size: 14px; }
    .chat-msg .chat-name::after { content: ":"; color: #666; }
    .chat-msg .chat-text { color: #ddd; }
    .chat-msg.chat-system {
      color: #777;
      font-size: 14px;
      font-style: italic;
      text-align: center;
      margin: 4px 0;
    }
    .chat-badge {
      display: inline-block;
      background: #f5a623;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      min-width: 20px;
      height: 20px;
      line-height: 20px;
      text-align: center;
      border-radius: 10px;
      margin-left: 4px;
      padding: 0 4px;
      font-style: normal;
    }
    #chat-input-bar {
      display: flex;
      padding: 4px;
      gap: 4px;
      border-top: 1px solid #0f3460;
    }
    #chat-input {
      flex: 1;
      background: #0f1b38;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
    }
    #chat-input:focus { outline: none; border-color: #f5a623; }
    #chat-send {
      background: #533483;
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    #chat-send:hover { background: #6b44a0; }

    /* Music control */
    #music-control {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #music-toggle {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
    }
    #music-toggle:hover { border-color: #f5a623; }
    #volume-slider {
      width: 60px;
      accent-color: #f5a623;
    }
    #lang-toggle {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
      font-weight: bold;
    }
    #lang-toggle:hover { border-color: #f5a623; }

    /* Focus button */
    #focus-btn {
      background: #16213e;
      color: #f5a623;
      border: 1px solid #f5a623;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.2s;
    }
    #focus-btn:hover { background: #1a2a4e; }
    #focus-btn.active {
      background: #f5a623;
      color: #fff;
    }

    /* Focus timer display in UI bar */
    #focus-timer-display {
      color: #f5a623;
      font-size: 16px;
      font-weight: bold;
      display: none;
      gap: 8px;
      align-items: center;
    }
    #focus-task-label {
      color: #eee;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #focus-time-value {
      color: #f5a623;
      font-variant-numeric: tabular-nums;
    }

    /* Focus popup overlay */
    #focus-popup {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .focus-popup-inner {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      width: 280px;
      text-align: center;
    }
    .focus-popup-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #eee;
    }
    .focus-category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .focus-cat-btn {
      background: #0f1b38;
      color: #eee;
      border: 2px solid #0f3460;
      padding: 8px 8px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    .focus-cat-btn:hover { border-color: #f5a623; }
    .focus-cat-btn.selected {
      border-color: #f5a623;
      background: #1a2a4e;
    }
    #focus-task-input {
      width: 100%;
      background: #0f1b38;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 8px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    #focus-task-input:focus { outline: none; border-color: #f5a623; }
    .focus-popup-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .focus-popup-actions button {
      padding: 8px 20px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
    }
    #focus-confirm { background: #f5a623; color: #fff; }
    #focus-confirm:hover { background: #d03050; }
    #focus-cancel { background: #0f3460; color: #eee; }
    #focus-cancel:hover { background: #1a4a80; }

    /* Focus portal confirm */
    #focus-portal-confirm {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    /* History button */
    #history-btn {
      background: #16213e;
      color: #f5a623;
      border: 1px solid #0f3460;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
      transition: background 0.2s;
    }
    #history-btn:hover { background: #1a2a4e; }

    /* History popup */
    #history-popup {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .history-popup-inner {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      width: 340px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .history-popup-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #eee;
      text-align: center;
    }
    .history-today-summary {
      background: #0f1b38;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .history-today-label {
      color: #999;
      font-size: 14px;
    }
    .history-today-time {
      color: #f5a623;
      font-size: 28px;
      font-weight: bold;
      flex: 1;
    }
    .history-today-sessions {
      color: #999;
      font-size: 14px;
    }
    .history-section-label {
      color: #888;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .history-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 80px;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .history-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .history-bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      min-height: 2px;
      background: #f5a623;
      transition: height 0.3s ease;
    }
    .history-bar.today {
      background: #f5a623;
    }
    .history-bar-label {
      color: #666;
      font-size: 12px;
      margin-top: 4px;
    }
    .history-bar-value {
      color: #999;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .history-list {
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
    .history-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 4px;
      border-bottom: 1px solid rgba(15,52,96,0.5);
      font-size: 14px;
    }
    .history-row:last-child { border-bottom: none; }
    .history-row-icon { font-size: 14px; flex-shrink: 0; }
    .history-row-info {
      flex: 1;
      min-width: 0;
    }
    .history-row-task {
      color: #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-row-date {
      color: #666;
      font-size: 12px;
    }
    .history-row-duration {
      color: #f5a623;
      font-weight: bold;
      flex-shrink: 0;
    }
    .history-row-delete {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }
    .history-row-delete:hover {
      color: #f5a623;
      background: rgba(233,69,96,0.15);
    }
    .history-no-data {
      color: #666;
      font-size: 14px;
      text-align: center;
      padding: 20px 0;
    }
    #history-close {
      background: #0f3460;
      color: #eee;
      padding: 8px 20px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
    }
    #history-close:hover { background: #1a4a80; }

    @media (max-width: 600px) {
      .history-popup-inner { width: 90vw; }
      .history-chart { height: 60px; }
      .history-list { max-height: 120px; }
    }

    /* Emoji Picker */
    #emoji-picker {
      position: absolute;
      z-index: 40;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 8px;
      background: rgba(22,33,62,0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(245,166,35,0.3);
      border-radius: 12px;
    }
    #emoji-picker-name {
      color: #4DA6FF;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #emoji-picker-buttons {
      display: flex;
      gap: 4px;
    }
    .emoji-btn {
      width: 44px;
      height: 44px;
      font-size: 22px;
      background: rgba(255,255,255,0.06);
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .emoji-btn:hover {
      border-color: #f5a623;
      background: rgba(245,166,35,0.12);
    }

    /* Reaction notifications */
    #reaction-notifications {
      position: absolute;
      left: 8px;
      bottom: 8px;
      z-index: 18;
      max-height: 180px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      gap: 4px;
      pointer-events: auto;
    }
    #reaction-notifications::-webkit-scrollbar { width: 4px; }
    #reaction-notifications::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
    .reaction-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      margin-bottom: 4px;
      background: rgba(22,33,62,0.85);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 4px;
      white-space: nowrap;
    }
    .reaction-time {
      color: #666;
      font-size: 12px;
      flex-shrink: 0;
    }
    .reaction-content {
      color: #ddd;
      font-size: 14px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .reaction-content .reaction-name {
      color: #4DA6FF;
      font-weight: bold;
    }
    .reaction-close {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    .reaction-close:hover {
      color: #f5a623;
    }
    /* Lounge chat visible: push notifications above chat */
    #chat-wrap.visible ~ #reaction-notifications {
      bottom: 248px;
    }
    #chat-wrap.visible:has(#chat-panel.collapsed) ~ #reaction-notifications {
      bottom: 60px;
    }

    /* Character picker grid */
    .char-picker-label {
      font-size: 14px;
      color: #999;
      margin-bottom: 8px;
    }
    .char-picker-grid {
      display: grid;
      grid-template-columns: repeat(4, 48px);
      gap: 6px;
      margin-bottom: 12px;
      justify-content: center;
    }
    .char-pick {
      width: 48px;
      height: 48px;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #0f1b38;
      cursor: pointer;
      padding: 2px;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated;
    }
    .char-pick:hover { border-color: #f5a623; background: #1a2a4e; }
    .char-pick.selected { border-color: #f5a623; background: #1a2a4e; }
    .char-pick canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Settings character button */
    #settings-char-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #0f3460;
      border-radius: 4px;
      background: #16213e;
      cursor: pointer;
      padding: 1px;
      image-rendering: pixelated;
      transition: border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #settings-char-btn:hover { border-color: #f5a623; }
    #settings-char-btn canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    /* Settings character picker dropdown */
    #settings-char-picker {
      position: absolute;
      bottom: 100%;
      right: 0;
      margin-bottom: 4px;
      background: rgba(22,33,62,0.95);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 8px;
      display: none;
      z-index: 50;
    }
    #settings-char-picker.visible { display: block; }
    #settings-char-picker .char-picker-grid {
      margin-bottom: 0;
    }

    /* Welcome popup */
    #welcome-popup {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 35;
    }
    #welcome-popup.hidden { display: none; }
    .welcome-inner {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 24px 24px;
      width: 260px;
      text-align: center;
    }
    .welcome-greeting {
      font-size: 32px;
      margin-bottom: 4px;
    }
    .welcome-title {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 16px;
    }
    #welcome-name {
      width: 100%;
      background: #0f1b38;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      text-align: center;
      box-sizing: border-box;
      margin-bottom: 12px;
      -webkit-user-select: text;
      user-select: text;
    }
    #welcome-name:focus { outline: none; border-color: #f5a623; }
    #welcome-name::placeholder { color: #555; }
    .welcome-hint {
      font-size: 16px;
      color: #666;
      margin-bottom: 12px;
    }
    #welcome-enter {
      background: #f5a623;
      color: #fff;
      border: none;
      padding: 8px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.2s;
    }
    #welcome-enter:hover { background: #d03050; }

    /* Auto-walk hint */
    #autowalk-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(22,33,62,0.9);
      color: #f5a623;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      z-index: 25;
      pointer-events: none;
      display: none;
    }

    /* Mobile portrait layout */
    @media (max-width: 600px) {
      #hint { display: none; }

      #action-bar select, #action-bar button {
        font-size: 16px;
        padding: 4px 12px;
        min-height: 44px;
      }

      /* Smooth repositioning on room switch */
      #joystick-zone, #action-bar {
        transition: bottom 0.3s ease;
      }

      /* Focus Zone defaults (no chat) */
      #action-bar { bottom: 8px; }
      #joystick-zone { bottom: 68px; }

      /* Lounge: chat bottom drawer with margin */
      #chat-wrap.visible {
        flex-direction: column-reverse;
        left: 8px;
        right: 8px;
        bottom: 8px;
      }
      #chat-wrap.visible #chat-panel {
        width: 100%;
        height: 180px;
        border-radius: 8px 8px 0 0;
        border-bottom: none;
      }
      #chat-wrap.visible #chat-panel.collapsed {
        height: 0;
        border: none;
      }
      #chat-wrap.visible #chat-toggle {
        width: 100%;
        text-align: center;
        border-radius: 0 0 8px 8px;
        align-self: stretch;
        min-height: 44px;
        font-size: 16px;
      }
      /* Collapsed: toggle gets full radius */
      #chat-wrap.visible:has(#chat-panel.collapsed) #chat-toggle {
        border-radius: 8px;
      }

      /* Lounge expanded: push action bar & joystick above chat */
      #chat-wrap.visible ~ #action-bar {
        bottom: 244px;
      }
      #chat-wrap.visible ~ #joystick-zone {
        bottom: 304px;
      }

      /* Lounge collapsed: 8px gap above the 44px toggle + 8px bottom */
      #chat-wrap.visible:has(#chat-panel.collapsed) ~ #action-bar {
        bottom: 68px;
      }
      #chat-wrap.visible:has(#chat-panel.collapsed) ~ #joystick-zone {
        bottom: 128px;
      }

      /* Mobile: notification panel full width */
      #reaction-notifications {
        width: calc(100vw - 16px);
      }
      #chat-wrap.visible ~ #reaction-notifications {
        bottom: 244px;
      }
      #chat-wrap.visible:has(#chat-panel.collapsed) ~ #reaction-notifications {
        bottom: 60px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
    <div id="welcome-popup">
      <div class="welcome-inner">
        <div class="welcome-greeting">&#x1F44B;</div>
        <div class="welcome-title">What would you like to be called?</div>
        <input id="welcome-name" type="text" placeholder="Your name..." maxlength="12" />
        <div class="char-picker-label" id="char-picker-label">Choose your look</div>
        <div class="char-picker-grid" id="welcome-char-grid"></div>
        <div class="welcome-hint">You can change it anytime in ⚙️</div>
        <button id="welcome-enter">Enter</button>
      </div>
    </div>
    <div id="room-label" class="focus">Focus Zone</div>
    <div id="chat-wrap">
      <button id="chat-toggle">Hide</button>
      <div id="chat-panel">
        <div id="chat-title">Lounge Chat</div>
        <div id="chat-messages"></div>
        <div id="chat-input-bar">
          <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>
    <div id="focus-popup">
      <div class="focus-popup-inner">
        <div class="focus-popup-title">What are you focusing on?</div>
        <div class="focus-category-grid">
          <button class="focus-cat-btn selected" data-category="studying">📖 Study</button>
          <button class="focus-cat-btn" data-category="working">💼 Work</button>
          <button class="focus-cat-btn" data-category="creating">📝 Create</button>
          <button class="focus-cat-btn" data-category="reading">📚 Read</button>
        </div>
        <input id="focus-task-input" type="text" placeholder="Task name (optional)..." maxlength="50" />
        <div class="focus-popup-actions">
          <button id="focus-confirm">Start</button>
          <button id="focus-cancel">Cancel</button>
        </div>
      </div>
    </div>
    <div id="focus-portal-confirm" style="display:none;">
      <div class="focus-popup-inner">
        <div class="focus-popup-title">End focus and go to Lounge?</div>
        <div class="focus-popup-actions">
          <button id="focus-portal-yes">Yes, take a break</button>
          <button id="focus-portal-no">Keep focusing</button>
        </div>
      </div>
    </div>
    <div id="history-popup">
      <div class="history-popup-inner">
        <div class="history-popup-title">Focus History</div>
        <div class="history-today-summary">
          <span class="history-today-label">Today</span>
          <span id="history-today-time" class="history-today-time">0 min</span>
          <span class="history-today-sessions"><span id="history-today-count">0</span> sessions</span>
        </div>
        <div class="history-section-label">Last 7 Days</div>
        <div id="history-chart" class="history-chart"></div>
        <div class="history-section-label">Recent Sessions</div>
        <div id="history-list" class="history-list"></div>
        <div class="focus-popup-actions">
          <button id="history-close">Close</button>
        </div>
      </div>
    </div>
    <div id="emoji-picker" style="display:none;">
      <div id="emoji-picker-name"></div>
      <div id="emoji-picker-buttons">
        <button class="emoji-btn" data-emoji="👋">👋</button>
        <button class="emoji-btn" data-emoji="💪">💪</button>
        <button class="emoji-btn" data-emoji="❤️">❤️</button>
        <button class="emoji-btn" data-emoji="⭐">⭐</button>
      </div>
    </div>
    <div id="reaction-notifications">
      <div id="reaction-list"></div>
    </div>
    <div id="autowalk-hint">Going to rest...</div>
    <div id="joystick-zone"><canvas id="joystick-canvas" width="130" height="130"></canvas></div>
    <div id="hint"></div>
    <div id="info-panel">
      <span id="online-total">🟢 1</span>
      <span id="online-detail">
        <span id="online-sep">┊</span>
        <span id="online-focus">📖 Focus 0</span>
        <span id="online-dot">·</span>
        <span id="online-lounge">☕ Lounge 0</span>
      </span>
    </div>
    <div id="settings-panel">
      <span id="settings-icon">⚙️</span>
      <span id="settings-detail">
        <div id="settings-char-wrap" style="position:relative;">
          <button id="settings-char-btn" title="Change character"></button>
          <div id="settings-char-picker">
            <div class="char-picker-grid" id="settings-char-grid"></div>
          </div>
        </div>
        <input id="name-input" type="text" placeholder="Your name..." maxlength="12" />
        <div id="music-control">
          <button id="music-toggle">Sound: OFF</button>
          <input id="volume-slider" type="range" min="0" max="100" value="30" />
        </div>
        <button id="lang-toggle">EN</button>
      </span>
    </div>
    <div id="action-bar">
      <select id="status-select">
        <option value="studying">studying</option>
        <option value="working">working</option>
        <option value="reading">reading</option>
        <option value="resting">resting</option>
        <option value="coding">coding</option>
      </select>
      <button id="focus-btn">Start Focus</button>
      <span id="focus-timer-display">
        <span id="focus-task-label"></span>
        <span id="focus-time-value">00:00</span>
      </span>
      <button id="history-btn" title="Focus History">&#x1f4ca;</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
