<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Together</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    #game-container {
      position: relative;
      border: 3px solid #16213e;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    canvas { display: block; }
    #ui-bar {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      align-items: center;
    }
    #ui-bar input, #ui-bar select {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      padding: 6px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
    }
    #ui-bar input:focus, #ui-bar select:focus {
      outline: none;
      border-color: #e94560;
    }
    #online-count {
      color: #53d769;
      font-size: 14px;
    }
    #hint {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="800" height="600"></canvas>
  </div>
  <div id="ui-bar">
    <input id="name-input" type="text" placeholder="Your name..." maxlength="12" />
    <select id="status-select">
      <option value="studying">studying</option>
      <option value="working">working</option>
      <option value="reading">reading</option>
      <option value="resting">resting</option>
      <option value="coding">coding</option>
    </select>
    <span id="online-count">Online: 1</span>
  </div>
  <div id="hint">Arrow keys / WASD to move</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
