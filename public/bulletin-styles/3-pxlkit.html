<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulletin Board - pxlkit Style (Warm)</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-warm: #f2e8d8;
    --surface: #e8dac6;
    --card: #efe4d2;
    --frame: #8b6848;
    --frame-light: #a88060;
    --text: #3a2818;
    --text-muted: #8a7060;
    --accent: #d4943c;
    --accent-hover: #c08030;
    --red: #cc4040;
    --border: #c8b8a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #a09080;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  /* Panel — warm wood frame + parchment */
  .panel {
    width: 500px;
    max-width: 95vw;
    max-height: 90vh;
    background: var(--bg-warm);
    border: 2px solid var(--frame);
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow:
      inset -3px -3px 0 0 rgba(0,0,0,0.1),
      inset 3px 3px 0 0 rgba(255,255,255,0.3),
      0 0 0 2px var(--frame-light),
      4px 4px 0 0 rgba(0,0,0,0.2);
  }
  .panel-title {
    text-align: center;
    font-size: 13px;
    margin-bottom: 14px;
    color: var(--frame);
    text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
  }
  .section-label {
    color: var(--text-muted);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .scroll-area {
    flex: 1; overflow-y: auto; min-height: 0;
    margin-bottom: 12px; max-height: 50vh;
    scrollbar-width: thin;
    scrollbar-color: var(--frame-light) var(--surface);
  }
  .scroll-area::-webkit-scrollbar { width: 6px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--frame-light); border-radius: 0; }
  .scroll-area::-webkit-scrollbar-track { background: var(--surface); }
  /* Announcements */
  .ann-item {
    background: var(--surface);
    padding: 10px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
  }
  .ann-text { color: var(--text); font-size: 10px; word-break: break-word; }
  .ann-meta { color: var(--text-muted); font-size: 8px; margin-top: 4px; }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }
  /* Notes — bright cheerful sticky notes with chamfered corners */
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .note-card {
    padding: 10px;
    font-size: 10px;
    word-break: break-word;
    border: 1px solid;
    clip-path: polygon(4px 0, calc(100% - 4px) 0, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0 calc(100% - 4px), 0 4px);
  }
  .note-card.color-yellow { background: #fff4b8; border-color: #e0c860; color: #4a3810; }
  .note-card.color-pink   { background: #ffd0d8; border-color: #e8a0a8; color: #4a1820; }
  .note-card.color-blue   { background: #c8e0f8; border-color: #90b8e0; color: #182840; }
  .note-card.color-green  { background: #c8f0c8; border-color: #80c880; color: #183818; }
  .note-card.color-purple { background: #e0d0f0; border-color: #b898d0; color: #281838; }
  .note-text { margin-bottom: 6px; }
  .note-meta { font-size: 8px; opacity: 0.6; }
  .note-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .note-like { font-size: 8px; opacity: 0.5; cursor: pointer; }
  .note-like.liked { color: var(--red); opacity: 1; }
  .note-delete { font-size: 8px; opacity: 0.4; cursor: pointer; }
  /* Input */
  .input-area { margin-bottom: 10px; }
  .input-area textarea {
    width: 100%;
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    resize: none;
    outline: none;
  }
  .input-area textarea:focus { border-color: var(--accent); box-shadow: 0 0 4px rgba(212,148,60,0.2); }
  .input-area textarea::placeholder { color: var(--text-muted); }
  .counter { text-align: right; font-size: 8px; color: var(--text-muted); margin-top: 2px; }
  /* Buttons — warm offset shadow */
  .actions { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    padding: 10px 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    letter-spacing: 0.05em;
    box-shadow: 3px 3px 0 0 rgba(0,0,0,0.15);
    transition: all 0.15s;
  }
  .btn:hover { box-shadow: 2px 2px 0 0 rgba(0,0,0,0.15); transform: translate(1px, 1px); }
  .btn:active { box-shadow: 0 0 0 0; transform: translate(3px, 3px); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent-hover);
    box-shadow: 3px 3px 0 0 var(--accent-hover);
  }
  .btn-primary:hover { box-shadow: 2px 2px 0 0 var(--accent-hover); background: var(--accent-hover); }
</style>
</head>
<body>
<div class="overlay">
  <div class="panel">
    <div class="panel-title">Bulletin Board</div>
    <div class="scroll-area">
      <div class="section-label">Announcements</div>
      <div class="ann-item">
        <div class="ann-text">Welcome to the cozy space! Feel free to leave a note.</div>
        <div class="ann-meta">Admin - 2 hours ago</div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Notes</div>
      <div class="notes-grid">
        <div class="note-card color-yellow">
          <div class="note-text">Having a great study session today!</div>
          <div class="note-footer">
            <span class="note-meta">Alice</span>
            <span class="note-like liked">&#10084; 3</span>
          </div>
        </div>
        <div class="note-card color-pink">
          <div class="note-text">The cat is so cute~</div>
          <div class="note-footer">
            <span class="note-meta">Bob</span>
            <span class="note-like">&#9825; 1</span>
          </div>
        </div>
        <div class="note-card color-blue">
          <div class="note-text">Focus mode activated!</div>
          <div class="note-footer">
            <span class="note-meta">Charlie</span>
            <span class="note-like">&#9825; 0</span>
          </div>
        </div>
        <div class="note-card color-green">
          <div class="note-text">Good vibes only :)</div>
          <div class="note-footer">
            <span class="note-meta">Dana</span>
            <span class="note-like liked">&#10084; 5</span>
          </div>
        </div>
        <div class="note-card color-purple">
          <div class="note-text">Anyone want to study together?</div>
          <div class="note-footer">
            <span class="note-meta">Eve</span>
            <span class="note-like">&#9825; 2</span>
          </div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="input-area">
      <textarea rows="2" placeholder="Leave a note..."></textarea>
      <div class="counter">0/100</div>
    </div>
    <div class="actions">
      <button class="btn">Close</button>
      <button class="btn btn-primary">Post</button>
    </div>
  </div>
</div>
</body>
</html>
