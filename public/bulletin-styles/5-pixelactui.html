<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulletin Board - PixelactUI Style (Warm)</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5ead6;
    --card: #ebe0cc;
    --text: #3a2818;
    --muted: #907860;
    --border: #b8a488;
    --accent: #d4943c;
    --red: #cc4040;
    --shadow-w: 3px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #a09080;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    line-height: 1.5;
    letter-spacing: 0.5px;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  /* 4-direction box-shadow borders — warm wood color */
  .pixel-box {
    border: none;
    border-radius: 0;
    box-shadow:
      calc(-1 * var(--shadow-w)) 0 0 0 #8b6848,
       var(--shadow-w) 0 0 0 #8b6848,
       0 calc(-1 * var(--shadow-w)) 0 0 #8b6848,
       0  var(--shadow-w) 0 0 #8b6848;
    margin: var(--shadow-w);
  }
  .pixel-box-light {
    box-shadow:
      calc(-1 * var(--shadow-w)) 0 0 0 var(--border),
       var(--shadow-w) 0 0 0 var(--border),
       0 calc(-1 * var(--shadow-w)) 0 0 var(--border),
       0  var(--shadow-w) 0 0 var(--border);
  }
  /* Panel */
  .panel {
    width: 500px;
    max-width: 95vw;
    max-height: 90vh;
    background: var(--bg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-title {
    text-align: center;
    font-size: 13px;
    margin-bottom: 14px;
    color: #6b4828;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
  }
  .section-label {
    color: var(--muted);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .scroll-area {
    flex: 1; overflow-y: auto; min-height: 0;
    margin-bottom: 12px; max-height: 50vh;
  }
  .scroll-area::-webkit-scrollbar { width: 6px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--border); }
  .scroll-area::-webkit-scrollbar-track { background: var(--card); }
  /* Announcements */
  .ann-item {
    background: #fff8ec;
    padding: 10px;
    margin: 8px var(--shadow-w) 12px;
  }
  .ann-text { color: var(--text); font-size: 10px; word-break: break-word; }
  .ann-meta { color: var(--muted); font-size: 8px; margin-top: 4px; }
  .divider {
    height: 1px;
    background: var(--border);
    border: none;
    margin: 12px 0;
  }
  /* Notes — bright warm sticky notes with colored pixel borders */
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .note-card {
    padding: 10px;
    font-size: 10px;
    word-break: break-word;
    position: relative;
  }
  .note-card::after {
    content: '';
    position: absolute;
    right: 0; bottom: 0;
    width: calc(100% - 1px);
    height: calc(100% - 1px);
    border-right: var(--shadow-w) solid rgba(0,0,0,0.1);
    border-bottom: var(--shadow-w) solid rgba(0,0,0,0.1);
    pointer-events: none;
  }
  .note-card.color-yellow { --c: #e8b830; background: #fff4b8; }
  .note-card.color-pink   { --c: #e08898; background: #ffd0d8; }
  .note-card.color-blue   { --c: #70a8d0; background: #c8e0f8; }
  .note-card.color-green  { --c: #68b868; background: #c8f0c8; }
  .note-card.color-purple { --c: #a080c0; background: #e0d0f0; }
  .note-card[class*="color-"] {
    box-shadow:
      calc(-1 * var(--shadow-w)) 0 0 0 var(--c),
       var(--shadow-w) 0 0 0 var(--c),
       0 calc(-1 * var(--shadow-w)) 0 0 var(--c),
       0  var(--shadow-w) 0 0 var(--c);
    color: var(--text);
  }
  .note-text { margin-bottom: 6px; }
  .note-meta { font-size: 8px; opacity: 0.5; }
  .note-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .note-like { font-size: 8px; opacity: 0.5; cursor: pointer; }
  .note-like.liked { color: var(--red); opacity: 1; }
  .note-delete { font-size: 8px; opacity: 0.3; cursor: pointer; }
  /* Input */
  .input-area { margin-bottom: 10px; }
  .input-area textarea {
    width: 100%;
    background: #fff;
    color: var(--text);
    border: none;
    padding: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    resize: none;
    outline: none;
    margin: var(--shadow-w);
  }
  .input-area textarea::placeholder { color: var(--muted); }
  .counter { text-align: right; font-size: 8px; color: var(--muted); margin-top: 2px; }
  /* Buttons */
  .actions { display: flex; gap: 12px; }
  .btn {
    flex: 1;
    padding: 10px 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    border: none;
    border-radius: 0;
    margin: var(--shadow-w);
    transition: transform 0.1s;
    position: relative;
  }
  .btn::after {
    content: '';
    position: absolute;
    right: 0; bottom: 0;
    width: 100%; height: 100%;
    border-right: var(--shadow-w) solid rgba(0,0,0,0.12);
    border-bottom: var(--shadow-w) solid rgba(0,0,0,0.12);
    pointer-events: none;
  }
  .btn:active { transform: translateY(3px); }
  .btn-secondary {
    background: var(--card);
    color: var(--text);
    box-shadow:
      calc(-1 * var(--shadow-w)) 0 0 0 var(--border),
       var(--shadow-w) 0 0 0 var(--border),
       0 calc(-1 * var(--shadow-w)) 0 0 var(--border),
       0  var(--shadow-w) 0 0 var(--border);
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow:
      calc(-1 * var(--shadow-w)) 0 0 0 var(--accent),
       var(--shadow-w) 0 0 0 var(--accent),
       0 calc(-1 * var(--shadow-w)) 0 0 var(--accent),
       0  var(--shadow-w) 0 0 var(--accent);
  }
</style>
</head>
<body>
<div class="overlay">
  <div class="panel pixel-box">
    <div class="panel-title">Bulletin Board</div>
    <div class="scroll-area">
      <div class="section-label">Announcements</div>
      <div class="ann-item pixel-box-light">
        <div class="ann-text">Welcome to the cozy space! Feel free to leave a note.</div>
        <div class="ann-meta">Admin - 2 hours ago</div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Notes</div>
      <div class="notes-grid">
        <div class="note-card color-yellow">
          <div class="note-text">Having a great study session today!</div>
          <div class="note-footer">
            <span class="note-meta">Alice</span>
            <span class="note-like liked">&#10084; 3</span>
          </div>
        </div>
        <div class="note-card color-pink">
          <div class="note-text">The cat is so cute~</div>
          <div class="note-footer">
            <span class="note-meta">Bob</span>
            <span class="note-like">&#9825; 1</span>
          </div>
        </div>
        <div class="note-card color-blue">
          <div class="note-text">Focus mode activated!</div>
          <div class="note-footer">
            <span class="note-meta">Charlie</span>
            <span class="note-like">&#9825; 0</span>
          </div>
        </div>
        <div class="note-card color-green">
          <div class="note-text">Good vibes only :)</div>
          <div class="note-footer">
            <span class="note-meta">Dana</span>
            <span class="note-like liked">&#10084; 5</span>
          </div>
        </div>
        <div class="note-card color-purple">
          <div class="note-text">Anyone want to study together?</div>
          <div class="note-footer">
            <span class="note-meta">Eve</span>
            <span class="note-like">&#9825; 2</span>
          </div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="input-area">
      <textarea class="pixel-box-light" rows="2" placeholder="Leave a note..."></textarea>
      <div class="counter">0/100</div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary">Close</button>
      <button class="btn btn-primary">Post</button>
    </div>
  </div>
</div>
</body>
</html>
