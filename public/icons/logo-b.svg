<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- B: 像素 b + 猫耳 — 3px粗竖笔，大三角耳 -->
  <rect width="16" height="16" rx="3" fill="#2B1D16"/>
  <g shape-rendering="crispEdges">
    <g fill="#F3E6D6">
      <!-- 竖笔 (3px宽) -->
      <rect x="1" y="1" width="3" height="13"/>
      <!-- 圆弧上 -->
      <rect x="4" y="7" width="8" height="1"/>
      <!-- 圆弧右 -->
      <rect x="10" y="8" width="3" height="4"/>
      <!-- 圆弧下 -->
      <rect x="4" y="13" width="8" height="1"/>
    </g>
    <!-- 猫耳 (琥珀色，3行高三角) -->
    <g fill="#E8A862">
      <rect x="6" y="4" width="1" height="1"/>
      <rect x="11" y="4" width="1" height="1"/>
      <rect x="5" y="5" width="3" height="1"/>
      <rect x="10" y="5" width="3" height="1"/>
      <rect x="4" y="6" width="4" height="1"/>
      <rect x="9" y="6" width="4" height="1"/>
    </g>
  </g>
</svg>