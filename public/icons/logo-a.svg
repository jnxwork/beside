<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- A: 像素猫脸 — 填满画布，大耳朵，2x2眼睛 -->
  <rect width="16" height="16" rx="3" fill="#2B1D16"/>
  <g shape-rendering="crispEdges" fill="#E8A862">
    <!-- 耳朵 (3行高，显眼) -->
    <rect x="2" y="1" width="2" height="1"/>
    <rect x="12" y="1" width="2" height="1"/>
    <rect x="1" y="2" width="4" height="1"/>
    <rect x="11" y="2" width="4" height="1"/>
    <rect x="1" y="3" width="5" height="1"/>
    <rect x="10" y="3" width="5" height="1"/>
    <!-- 头 -->
    <rect x="1" y="4" width="14" height="3"/>
    <!-- 眼睛那两行 (留2x2的洞) -->
    <rect x="1" y="7" width="3" height="2"/>
    <rect x="6" y="7" width="4" height="2"/>
    <rect x="12" y="7" width="3" height="2"/>
    <!-- 脸下半 -->
    <rect x="1" y="9" width="14" height="1"/>
    <rect x="2" y="10" width="12" height="1"/>
    <rect x="3" y="11" width="10" height="1"/>
    <rect x="4" y="12" width="8" height="1"/>
  </g>
</svg>