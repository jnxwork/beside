<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Pixel-style "Beside" text -->
  <style>
    .letter { fill: #f5e6d0; }
    .accent { fill: #f5a623; }
    .cat { fill: #c87941; }
    .cat-dark { fill: #a05e2a; }
    .cat-ear { fill: #e8a065; }
  </style>

  <!-- B -->
  <rect class="letter" x="8" y="12" width="4" height="24"/>
  <rect class="letter" x="12" y="12" width="8" height="4"/>
  <rect class="letter" x="12" y="22" width="8" height="4"/>
  <rect class="letter" x="12" y="32" width="8" height="4"/>
  <rect class="letter" x="20" y="16" width="4" height="6"/>
  <rect class="letter" x="20" y="26" width="4" height="6"/>

  <!-- e -->
  <rect class="letter" x="28" y="20" width="4" height="16"/>
  <rect class="letter" x="32" y="16" width="8" height="4"/>
  <rect class="letter" x="32" y="24" width="8" height="4"/>
  <rect class="letter" x="32" y="32" width="8" height="4"/>
  <rect class="letter" x="40" y="20" width="4" height="4"/>

  <!-- s -->
  <rect class="letter" x="48" y="16" width="12" height="4"/>
  <rect class="letter" x="48" y="20" width="4" height="4"/>
  <rect class="letter" x="48" y="24" width="12" height="4"/>
  <rect class="letter" x="56" y="28" width="4" height="4"/>
  <rect class="letter" x="48" y="32" width="12" height="4"/>

  <!-- i -->
  <rect class="accent" x="66" y="10" width="4" height="4"/>
  <rect class="letter" x="66" y="18" width="4" height="18"/>

  <!-- d -->
  <rect class="letter" x="80" y="8" width="4" height="28"/>
  <rect class="letter" x="74" y="18" width="6" height="4"/>
  <rect class="letter" x="74" y="32" width="6" height="4"/>
  <rect class="letter" x="70" y="22" width="4" height="10"/>

  <!-- e -->
  <rect class="letter" x="88" y="20" width="4" height="16"/>
  <rect class="letter" x="92" y="16" width="8" height="4"/>
  <rect class="letter" x="92" y="24" width="8" height="4"/>
  <rect class="letter" x="92" y="32" width="8" height="4"/>
  <rect class="letter" x="100" y="20" width="4" height="4"/>

  <!-- Small pixel cat sitting next to text -->
  <!-- Body -->
  <rect class="cat" x="112" y="28" width="12" height="8"/>
  <!-- Head -->
  <rect class="cat" x="114" y="22" width="8" height="6"/>
  <!-- Left ear -->
  <rect class="cat-ear" x="113" y="19" width="3" height="4"/>
  <!-- Right ear -->
  <rect class="cat-ear" x="120" y="19" width="3" height="4"/>
  <!-- Eyes -->
  <rect class="cat-dark" x="116" y="24" width="2" height="2"/>
  <rect class="cat-dark" x="120" y="24" width="2" height="2"/>
  <!-- Tail curving up -->
  <rect class="cat" x="124" y="30" width="4" height="2"/>
  <rect class="cat" x="128" y="28" width="2" height="2"/>
  <rect class="cat-ear" x="130" y="26" width="2" height="2"/>

  <!-- Tiny heart above cat -->
  <rect class="accent" x="118" y="14" width="2" height="2"/>
  <rect class="accent" x="122" y="14" width="2" height="2"/>
  <rect class="accent" x="117" y="15" width="3" height="2"/>
  <rect class="accent" x="122" y="15" width="3" height="2"/>
  <rect class="accent" x="118" y="17" width="6" height="1"/>
  <rect class="accent" x="119" y="18" width="4" height="1"/>
  <rect class="accent" x="120" y="19" width="2" height="1"/>
</svg>