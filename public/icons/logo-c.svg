<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- C: 人+猫并肩 — beside的直接表达 -->
  <rect width="16" height="16" rx="3" fill="#2B1D16"/>
  <g shape-rendering="crispEdges">
    <!-- 人 (奶白，高瘦) -->
    <g fill="#F3E6D6">
      <rect x="2" y="3" width="3" height="1"/>
      <rect x="1" y="4" width="5" height="8"/>
    </g>
    <!-- 猫 (琥珀，矮胖+尖耳) -->
    <g fill="#E8A862">
      <rect x="8" y="4" width="1" height="1"/>
      <rect x="13" y="4" width="1" height="1"/>
      <rect x="7" y="5" width="3" height="1"/>
      <rect x="12" y="5" width="3" height="1"/>
      <rect x="7" y="6" width="8" height="5"/>
      <rect x="8" y="11" width="6" height="1"/>
    </g>
  </g>
</svg>